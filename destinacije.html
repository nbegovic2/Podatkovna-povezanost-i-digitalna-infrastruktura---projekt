<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bucket List – Destinacije</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="logo">🗺️ Bucket List</a>
  <div class="nav-links">
    <a href="index.html">Početna</a>
    <a href="destinacije.html">Destinacije</a>
    <a href="kontinenti.html">Kontinenti</a>
    <a href="kontakt.html">Kontakt</a>
  </div>
</nav>

<div class="page">

  <h1>Sve destinacije</h1>
  <p class="subtitle">Sve lokacije na tvom bucket listu — filtriraj po kontinentu.</p>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-ukupno">0</div>
      <div class="stat-label">Ukupno</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-posjeceno">0</div>
      <div class="stat-label">Posjećeno</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-preostalo">0</div>
      <div class="stat-label">Preostalo</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span class="section-label">Napredak</span>
      <span id="stat-pct" style="font-size:0.82rem; color:var(--muted)">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="section-label" id="list-label">Sve destinacije</div>
  <div class="filters" id="filters"></div>
  <div class="dest-grid" id="dest-grid"></div>

</div>

<script src="script.js"></script>
</body>
</html>
